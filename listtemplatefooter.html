<script>
document.addEventListener('DOMContentLoaded', function() {
    // Abrufen des Masonry-Containers
    var grid = document.querySelector('.board');
    
    // Initialisierung von Masonry
    var msnry = new Masonry(grid);
    
    // **NEW GLOBAL FUNCTION**
    window.triggerMasonryLayout = function() {
        msnry.layout();
    };

    imagesLoaded( grid ).on( 'progress', function() {
        // layout Masonry after each image loads
        msnry.layout();
    });
    
    // Hinzufügen eines Event-Listeners für Klicks auf Elemente mit der Klasse "comment-link"
    document.querySelectorAll('.comment-link').forEach(function(link) {
        link.addEventListener('click', function() {
            // Überprüfen, ob das Masonry-Layout bereits initialisiert wurde
            if (msnry) {
                // Warten Sie 1 Sekunde, bevor das Layout neu angeordnet wird
                setTimeout(function() {
                    // Layout neu anordnen, nachdem die Höhe des Kommentarfelds geändert wurde
                    msnry.layout();
                }, 250); // 250 Millisekunden = 0,25 Sekunden
            }
        });
    });
});
</script>
